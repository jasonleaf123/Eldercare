<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elder Care Monitor - Three.js</title>
    <style>
        body { margin: 0; overflow: hidden; background: #ffffff; }
        canvas { display: block; position: fixed; inset: 0; z-index: 1; }
        #ward-backdrop { display: none; }
        #info {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0, 15, 30, 0.85);
            padding: 15px 20px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-left: 4px solid #00ffff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
            border-radius: 4px;
            pointer-events: none;
            z-index: 100;
            backdrop-filter: blur(4px);
            font-family: 'Courier New', Courier, monospace;
        }
        #info h1 {
            margin: 0 0 5px 0;
            font-size: 18px;
            color: #fff;
            text-shadow: 0 0 8px rgba(0, 255, 255, 0.8);
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 1px;
        }
        #info p {
            margin: 0;
            font-size: 11px;
            color: #00ffff;
            letter-spacing: 1px;
        }
        .live-dot {
            width: 8px;
            height: 8px;
            background-color: #ff3333;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px #ff3333;
            animation: pulse-dot 1.5s infinite;
        }
        @keyframes pulse-dot {
            0% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.3); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.6; }
        }

        #ai-panel {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 320px;
            height: 400px;
            background: rgba(0, 15, 30, 0.85);
            border: 1px solid #00ffff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
            color: #00ffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            border-radius: 5px;
            z-index: 100;
            pointer-events: auto;
            backdrop-filter: blur(2px);
        }
        #ai-panel-header {
            background: rgba(0, 255, 255, 0.2);
            padding: 10px;
            font-weight: bold;
            border-bottom: 1px solid #00ffff;
            text-align: center;
            letter-spacing: 2px;
        }
        #log-container {
            padding: 10px;
            overflow-y: hidden;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
            justify-content: flex-end;
        }
        .log-entry {
            background: rgba(255, 0, 0, 0.15);
            color: #ff5555;
            border-left: 4px solid #ff0000;
            padding: 6px 8px;
            font-size: 13px;
            animation: slideIn 0.3s ease-out;
            text-shadow: 0 0 5px rgba(255, 0, 0, 0.5);
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        #bottom-dashboard {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 10, 20, 0.9);
            border-top: 2px solid #00ffff;
            box-shadow: 0 -5px 15px rgba(0, 255, 255, 0.2);
            padding: 10px 20px;
            z-index: 100;
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            color: #00ffff;
            font-family: 'Courier New', Courier, monospace;
            backdrop-filter: blur(5px);
            box-sizing: border-box;
        }
        .dash-section {
            display: flex;
            flex-direction: column;
            background: rgba(0, 255, 255, 0.05);
            padding: 12px;
            border-radius: 5px;
            flex: 1;
            margin: 0 10px;
            border: 1px solid rgba(0, 255, 255, 0.2);
        }
        .dash-section h4 {
            margin: 0 0 10px 0;
            color: #fff;
            font-size: 15px;
            text-shadow: 0 0 5px #00ffff;
            border-bottom: 1px solid rgba(0, 255, 255, 0.5);
            padding-bottom: 5px;
            text-align: center;
        }
        .btn-group {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn-group button {
            background: rgba(0, 255, 255, 0.1);
            color: #00ffff;
            border: 1px solid #00ffff;
            padding: 6px 12px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 13px;
            font-weight: bold;
            flex: 1;
            min-width: 80px;
        }
        .btn-group button:hover {
            background: rgba(0, 255, 255, 0.3);
        }
        .btn-group button.active {
            background: #00ffff;
            color: #000;
            box-shadow: 0 0 10px #00ffff;
        }
        .dash-section.sliders label {
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .dash-section.sliders input[type=range] {
            flex: 1;
            margin: 0 15px;
            accent-color: #00ffff;
        }
        .ai-overlay-grid {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: linear-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 10px 10px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="ward-backdrop" aria-hidden="true"></div>

    <div id="info">
        <h1><span class="live-dot"></span> 安養中心監控中心</h1>
        <p>AI ELDERCARE MONITORING CENTER</p>
    </div>
    
    <div id="bottom-dashboard">
        <div class="dash-section">
            <h4>🕒 時段</h4>
            <div class="btn-group">
                <button id="btn-before">早上</button>
                <button id="btn-during" class="active">下午</button>
                <button id="btn-after">夜間</button>
            </div>
        </div>
        
        <div class="dash-section">
            <h4>👥 住民配置</h4>
            <div class="btn-group">
                <button id="btn-pop-low">少</button>
                <button id="btn-pop-med" class="active">中</button>
                <button id="btn-pop-high">多</button>
            </div>
        </div>

        <div class="dash-section sliders" style="flex: 2;">
            <h4>⚙️ AI 檢測參數</h4>
            <label><span style="width:100px; display:inline-block; text-align:left;">跌倒頻率:</span>
                <input type="range" id="freq-fall" min="0" max="100" value="5"> 
                <span id="val-freq-fall" style="width:60px; text-align:right;">0.05%</span>
            </label>
            <label><span style="width:100px; display:inline-block; text-align:left;">救援延遲:</span>
                <input type="range" id="resp-delay" min="5" max="120" value="30" step="5"> 
                <span id="val-resp-delay" style="width:60px; text-align:right;">30</span> <span style="width:15px; text-align:right;">秒</span>
            </label>
            <label><span style="width:100px; display:inline-block; text-align:left;">自動派護理:</span>
                <input type="checkbox" id="auto-dispatch" checked>
                <span id="val-auto-dispatch" style="width:40px; text-align:right;">ON</span>
            </label>
        </div>
        <div class="dash-section" style="max-width:140px;">
            <h4>⚠️ 緊急</h4>
            <div class="btn-group">
                <button id="btn-call-nurse" style="background:#ff6666;color:#fff;">呼叫護理</button>
            </div>
        </div>
    </div>

    <div id="ai-panel">
        <div class="ai-overlay-grid"></div>
        <div id="ai-panel-header">AI 智能安養監控 - LIVE </div>
        <div id="log-container"></div>
    </div>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- 全域狀態參數 ---
        const aiParams = {
            fallFreq: 0.0005,
            responseDelay: 30
        };

        const popConfig = {
            low: { before: 4, during: 6, after: 3 },
            med: { before: 8, during: 12, after: 8 },
            high: { before: 14, during: 18, after: 12 }
        };
        let currentPopLevel = 'med';
        let currentScenario = 'during';

        const logContainer = document.getElementById('log-container');
        function addAILog(message) {
            const el = document.createElement('div');
            el.className = 'log-entry';
            const timeStr = new Date().toLocaleTimeString('en-GB', { hour12: false });
            el.innerText = `[${timeStr}] ${message}`;
            logContainer.appendChild(el);
            if(logContainer.childElementCount > 10) logContainer.removeChild(logContainer.firstChild);
        }

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);
        scene.fog = new THREE.Fog(0xffffff, 24, 120);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(22, 11.5, 24); // More eye-level indoor view

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 3.5, -8);
        
        // --- 視角限制設定 (Camera Limits) ---
        controls.maxPolarAngle = Math.PI / 2 - 0.02; // 防止鑽到地下
        controls.minPolarAngle = 0.1; // 防止完全垂直俯視造成視角反轉
        controls.minDistance = 1;  // 最近距離
        controls.maxDistance = 100; // 最遠縮放距離，防止拉太遠
        
        controls.zoomSpeed = 3; 

        // 鎖定相機追蹤目標範圍的變數
        const minTarget = new THREE.Vector3(-38, 0, -38);
        const maxTarget = new THREE.Vector3(38, 15, 38);

        // 照明
        const ambientLight = new THREE.AmbientLight(0x666666, 1.0); 
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xfff6e0, 1.5);
        dirLight.position.set(-10, 35, 18);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        const d = 50; 
        dirLight.shadow.camera.left = -d; dirLight.shadow.camera.right = d;
        dirLight.shadow.camera.top = d; dirLight.shadow.camera.bottom = -d;
        scene.add(dirLight);

        // 地板與網格
        const planeGeometry = new THREE.PlaneGeometry(80, 80);
        const planeMaterial = new THREE.MeshStandardMaterial({ color: 0xf3eadf, roughness: 0.95, metalness: 0.0 });
        const floor = new THREE.Mesh(planeGeometry, planeMaterial);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);
        // subtle room floor grid
        const gridHelper = new THREE.GridHelper(80, 20, 0xe6d9c9, 0xf0e8de);
        gridHelper.position.y = 0.01;
        gridHelper.material.opacity = 0.25; gridHelper.material.transparent = true;
        scene.add(gridHelper);

        const mats = {
            wall: new THREE.MeshStandardMaterial({ color: 0xf8f4ee, roughness: 0.95, side: THREE.DoubleSide }),
            wallWarm: new THREE.MeshStandardMaterial({ color: 0xf1e7da, roughness: 0.95, side: THREE.DoubleSide }),
            trim: new THREE.MeshStandardMaterial({ color: 0xe6dac8, roughness: 0.9, side: THREE.DoubleSide }),
            wood: new THREE.MeshStandardMaterial({ color: 0xd0b28e, roughness: 0.9 }),
            woodDark: new THREE.MeshStandardMaterial({ color: 0xb28960, roughness: 0.85 }),
            fabric: new THREE.MeshStandardMaterial({ color: 0xf2efe6, roughness: 1.0 }),
            rail: new THREE.MeshStandardMaterial({ color: 0xcfc6ba, roughness: 0.45, metalness: 0.2 }),
            glass: new THREE.MeshStandardMaterial({ color: 0xe9f4ff, roughness: 0.2, metalness: 0.05, transparent: true, opacity: 0.55 }),
            accentGreen: new THREE.MeshStandardMaterial({ color: 0x8fae5c, roughness: 0.95 }),
            accentBlue: new THREE.MeshStandardMaterial({ color: 0x8fb6c9, roughness: 0.95 }),
            brass: new THREE.MeshStandardMaterial({ color: 0xc7a46a, roughness: 0.4, metalness: 0.2 }),
            darkText: new THREE.MeshStandardMaterial({ color: 0x5c4d41, roughness: 1.0 })
        };

        const obstacles = [];

        function createWallPanel(width, height, x, y, z, rotY, material = mats.wall) {
            const panel = new THREE.Mesh(new THREE.PlaneGeometry(width, height), material);
            panel.position.set(x, y + height / 2, z);
            panel.rotation.y = rotY;
            panel.castShadow = true;
            panel.receiveShadow = true;
            scene.add(panel);
            return panel;
        }

        function createBaseboard(width, x, z, rotY) {
            const board = new THREE.Mesh(new THREE.BoxGeometry(width, 0.25, 0.22), mats.trim);
            board.position.set(x, 0.13, z);
            board.rotation.y = rotY;
            scene.add(board);
            return board;
        }

        function createDoor(x, z, width, height, open = false, rotY = 0, parent = scene) {
            const door = new THREE.Group();
            const frame = new THREE.Mesh(new THREE.BoxGeometry(width + 0.25, height + 0.15, 0.18), mats.trim);
            const leaf = new THREE.Mesh(new THREE.BoxGeometry(width, height, 0.08), mats.wood);
            const handle = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.18, 0.06), mats.darkText);
            const panel = new THREE.Mesh(new THREE.BoxGeometry(width * 0.42, height * 0.4, 0.02), mats.woodDark);
            frame.position.y = height / 2;
            leaf.position.y = height / 2;
            panel.position.set(0, height * 0.52, 0.05);
            handle.position.set(width * 0.36, height * 0.45, 0.06);
            if (open) {
                door.rotation.y = -0.35;
                leaf.position.x = width * 0.2;
                handle.position.x = width * 0.54;
            }
            door.position.set(x, 0, z);
            door.rotation.y = rotY;
            door.add(frame, leaf, panel, handle);
            parent.add(door);
            return door;
        }

        function createHandRail(x, z, length, rotY) {
            const rail = new THREE.Group();
            const pipe = new THREE.Mesh(new THREE.CylinderGeometry(0.045, 0.045, length, 16), mats.rail);
            pipe.rotation.z = Math.PI / 2;
            pipe.position.y = 1.05;
            const cap1 = new THREE.Mesh(new THREE.SphereGeometry(0.06, 12, 12), mats.rail);
            const cap2 = cap1.clone();
            cap1.position.set(-length / 2, 1.05, 0);
            cap2.position.set(length / 2, 1.05, 0);
            rail.add(pipe, cap1, cap2);
            rail.position.set(x, 0, z);
            rail.rotation.y = rotY;
            scene.add(rail);
            return rail;
        }

        function createPendantLight(x, z) {
            const group = new THREE.Group();
            const cable = new THREE.Mesh(new THREE.CylinderGeometry(0.01, 0.01, 3.2), mats.brass);
            cable.position.y = -1.6;
            const shade = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.24, 0.18, 24), mats.brass);
            shade.position.y = -3.0;
            const bulb = new THREE.PointLight(0xffe2b6, 0.6, 10, 2.0);
            bulb.position.y = -3.1;
            group.add(cable, shade, bulb);
            group.position.set(x, 9.8, z);
            scene.add(group);
            return group;
        }

        function createPlant(x, z, scale = 1) {
            const plant = new THREE.Group();
            const pot = new THREE.Mesh(new THREE.CylinderGeometry(0.35 * scale, 0.45 * scale, 0.5 * scale, 16), mats.wood);
            pot.position.y = 0.25 * scale;
            const crown = new THREE.Group();
            const leafMat = new THREE.MeshStandardMaterial({ color: 0x7d9d4b, roughness: 1.0 });
            for (let i = 0; i < 7; i++) {
                const leaf = new THREE.Mesh(new THREE.SphereGeometry(0.22 * scale, 10, 10), leafMat);
                leaf.position.set(Math.cos(i) * 0.18 * scale, 0.7 * scale + (i % 2) * 0.16 * scale, Math.sin(i) * 0.18 * scale);
                crown.add(leaf);
            }
            plant.add(pot, crown);
            plant.position.set(x, 0, z);
            scene.add(plant);
            return plant;
        }

        function createNursingDesk(x, z) {
            const desk = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(4.5, 1.2, 1.6), mats.wood);
            body.position.y = 0.6;
            const top = new THREE.Mesh(new THREE.BoxGeometry(4.7, 0.12, 1.8), mats.fabric);
            top.position.y = 1.22;
            const chair = new THREE.Mesh(new THREE.BoxGeometry(0.85, 0.85, 0.85), mats.accentBlue);
            chair.position.set(-1.35, 0.42, 0.55);
            const shelf = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.18, 0.4), mats.woodDark);
            shelf.position.set(1.35, 1.7, -0.3);
            desk.add(body, top, chair, shelf);
            desk.position.set(x, 0, z);
            scene.add(desk);
            return desk;
        }

        function createCareBed(x, z, rotY = 0) {
            const bed = new THREE.Group();
            const base = new THREE.Mesh(new THREE.BoxGeometry(4.8, 0.28, 2.1), mats.rail);
            base.position.y = 0.42;
            const mattress = new THREE.Mesh(new THREE.BoxGeometry(4.5, 0.46, 1.75), mats.fabric);
            mattress.position.y = 0.75;
            const blanket = new THREE.Mesh(new THREE.BoxGeometry(3.8, 0.16, 1.5), mats.accentBlue);
            blanket.position.set(0.15, 0.98, 0.02);
            const headboard = new THREE.Mesh(new THREE.BoxGeometry(0.18, 1.0, 2.1), mats.wood);
            headboard.position.set(-2.25, 1.0, 0);
            const footboard = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.6, 1.8), mats.woodDark);
            footboard.position.set(2.28, 0.75, 0);
            const railLeft = new THREE.Mesh(new THREE.BoxGeometry(4.0, 0.08, 0.05), mats.rail);
            railLeft.position.set(0, 1.02, -0.88);
            const railRight = railLeft.clone();
            railRight.position.set(0, 1.02, 0.88);
            const pillow = new THREE.Mesh(new THREE.BoxGeometry(0.95, 0.22, 0.72), mats.fabric);
            pillow.position.set(-1.5, 0.98, 0.0);
            const wheelGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.08, 10);
            [[-2.05, 0.08, -0.85], [2.05, 0.08, -0.85], [-2.05, 0.08, 0.85], [2.05, 0.08, 0.85]].forEach(([wx, wy, wz]) => {
                const wheel = new THREE.Mesh(wheelGeo, mats.darkText);
                wheel.rotation.z = Math.PI / 2;
                wheel.position.set(wx, wy, wz);
                bed.add(wheel);
            });
            bed.add(base, mattress, blanket, headboard, footboard, railLeft, railRight, pillow);
            bed.position.set(x, 0, z);
            bed.rotation.y = rotY;
            scene.add(bed);
            bed.updateWorldMatrix(true, false);
            obstacles.push(new THREE.Box3().setFromObject(bed).expandByScalar(0.6));
        }

        function createLounger(x, z, rotY = 0) {
            const seat = new THREE.Group();
            const cushion = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.55, 1.4), mats.accentBlue);
            cushion.position.y = 0.3;
            const back = new THREE.Mesh(new THREE.BoxGeometry(1.6, 1.2, 0.22), mats.accentBlue);
            back.position.set(0, 0.95, -0.55);
            const armLeft = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.85, 1.2), mats.wood);
            armLeft.position.set(-0.74, 0.65, 0.05);
            const armRight = armLeft.clone();
            armRight.position.x = 0.74;
            seat.add(cushion, back, armLeft, armRight);
            seat.position.set(x, 0, z);
            seat.rotation.y = rotY;
            scene.add(seat);
            obstacles.push(new THREE.Box3().setFromObject(seat).expandByScalar(0.35));
        }

        function createWardRoom(x, z, width, depth, side) {
            const room = new THREE.Group();
            room.position.set(x, 0, z);

            const wallHeight = 8;
            const wallThickness = 0.28;
            const doorGap = 2.9;
            const backWall = new THREE.Mesh(new THREE.BoxGeometry(width, wallHeight, wallThickness), mats.wallWarm);
            backWall.position.set(0, wallHeight / 2, -depth / 2);
            room.add(backWall);

            const sideWallLeft = new THREE.Mesh(new THREE.BoxGeometry(wallThickness, wallHeight, depth), mats.wall);
            sideWallLeft.position.set(-width / 2, wallHeight / 2, 0);
            room.add(sideWallLeft);

            const sideWallRight = sideWallLeft.clone();
            sideWallRight.position.x = width / 2;
            room.add(sideWallRight);

            const frontWallLeft = new THREE.Mesh(new THREE.BoxGeometry((width - doorGap) / 2, wallHeight, wallThickness), mats.wall);
            frontWallLeft.position.set(-(doorGap + (width - doorGap) / 2) / 2, wallHeight / 2, depth / 2);
            const frontWallRight = frontWallLeft.clone();
            frontWallRight.position.x *= -1;
            room.add(frontWallLeft, frontWallRight);

            const trimTop = new THREE.Mesh(new THREE.BoxGeometry(width, 0.14, wallThickness + 0.02), mats.woodDark);
            trimTop.position.set(0, wallHeight + 0.05, -depth / 2);
            room.add(trimTop);

            const trimLeft = new THREE.Mesh(new THREE.BoxGeometry(wallThickness + 0.02, 0.14, depth), mats.woodDark);
            trimLeft.position.set(-width / 2, wallHeight + 0.05, 0);
            const trimRight = trimLeft.clone();
            trimRight.position.x = width / 2;
            room.add(trimLeft, trimRight);

            const frameLeft = new THREE.Mesh(new THREE.BoxGeometry(0.18, wallHeight, 0.22), mats.trim);
            const frameRight = frameLeft.clone();
            const frameTop = new THREE.Mesh(new THREE.BoxGeometry(doorGap + 0.36, 0.18, 0.22), mats.trim);
            frameLeft.position.set(-doorGap / 2, wallHeight / 2, depth / 2 + 0.01);
            frameRight.position.set(doorGap / 2, wallHeight / 2, depth / 2 + 0.01);
            frameTop.position.set(0, wallHeight - 0.05, depth / 2 + 0.01);
            room.add(frameLeft, frameRight, frameTop);

            const sill = new THREE.Mesh(new THREE.BoxGeometry(width - 0.8, 0.18, 0.18), mats.wall);
            sill.position.set(0, 0.09, depth / 2 - 0.05);
            room.add(sill);

            const bedX = 0;
            const bedRot = side === 'left' ? 0 : Math.PI;
            createCareBed(x + bedX, z - depth * 0.08, bedRot);

            const bedsideCabinet = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.0, 0.6), mats.woodDark);
            bedsideCabinet.position.set(side === 'left' ? width * 0.22 : -width * 0.22, 0.5, -depth * 0.1);
            room.add(bedsideCabinet);

            scene.add(room);
        }

        function createRoomBackdrop() {
            const roomWidth = 72;
            const roomDepth = 68;
            const halfWidth = roomWidth / 2;
            const halfDepth = roomDepth / 2;
            const corridorLeft = -7;
            const corridorRight = 7;
            const roomStops = [-24, -10, 4, 18, 32];
            const roomWidthInner = 16;
            const roomDepthInner = 13;

            createWallPanel(roomWidth, 9.4, 0, 0, -halfDepth, 0, mats.wallWarm);
            createWallPanel(roomWidth, 9.4, 0, 0, halfDepth, 0, mats.wallWarm);
            createWallPanel(9.4, 9.4, -halfWidth, 0, 0, Math.PI / 2, mats.wall);
            createWallPanel(9.4, 9.4, halfWidth, 0, 0, Math.PI / 2, mats.wall);

            createBaseboard(roomWidth, 0, -halfDepth + 0.12, 0);
            createBaseboard(roomWidth, 0, halfDepth - 0.12, 0);
            createBaseboard(roomDepth, -halfWidth + 0.12, 0, Math.PI / 2);
            createBaseboard(roomDepth, halfWidth - 0.12, 0, Math.PI / 2);

            const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(roomWidth, roomDepth), new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 1.0 }));
            ceiling.rotation.x = Math.PI / 2;
            ceiling.position.y = 9.35;
            scene.add(ceiling);

            for (const z of roomStops) {
                createWardRoom(-14, z, roomWidthInner, roomDepthInner, 'left');
                createWardRoom(14, z, roomWidthInner, roomDepthInner, 'right');
                createDoor(corridorLeft, z, 2.4, 7.0, false, Math.PI / 2);
                createDoor(corridorRight, z, 2.4, 7.0, false, -Math.PI / 2);
            }

            const entranceGroup = new THREE.Group();
            const entranceWall = new THREE.Mesh(new THREE.BoxGeometry(18, 8.2, 0.28), mats.wallWarm);
            entranceWall.position.y = 4.1;
            const entranceLeft = new THREE.Mesh(new THREE.BoxGeometry(7.2, 8.2, 0.28), mats.wallWarm);
            entranceLeft.position.set(-5.4, 4.1, 0);
            const entranceRight = entranceLeft.clone();
            entranceRight.position.x = 5.4;
            entranceGroup.add(entranceWall, entranceLeft, entranceRight);
            createDoor(0, 0.02, 3.2, 7.0, false, 0, entranceGroup);
            entranceGroup.position.set(0, 0, 31.4);
            scene.add(entranceGroup);

            const lampXs = [-28, -18, -8, 2, 12, 22, 32];
            for (let i = 0; i < lampXs.length; i++) {
                createPendantLight(lampXs[i], -18);
                createPendantLight(lampXs[i], 0);
                if (i % 2 === 0) createPendantLight(lampXs[i], 18);
            }

            createPlant(-33, -28, 1.0);
            createPlant(33, -28, 1.0);
            createPlant(-33, 28, 1.0);
            createPlant(33, 28, 1.0);

            const wardBanner = new THREE.Mesh(new THREE.BoxGeometry(12, 0.7, 0.06), mats.accentGreen);
            wardBanner.position.set(0, 7.6, 31.5);
            scene.add(wardBanner);
        }

        // outdoor crane removed for indoor eldercare scene

        // create simple beds and chairs for the indoor scene
        function buildWallSegment(w, t, x, y, z, rotY) {
            const group = new THREE.Group();
            group.position.set(x, y, z);
            group.rotation.y = rotY;

            const baseH = 1;
            const base = new THREE.Mesh(new THREE.BoxGeometry(w, baseH, t * 1.5), mats.concrete);
            base.position.y = baseH / 2;
            base.castShadow = true; base.receiveShadow = true;
            group.add(base);

            const panelH = 3.5;
            const panel = new THREE.Mesh(new THREE.BoxGeometry(w, panelH, t), mats.whiteMetal);
            panel.position.y = baseH + panelH / 2;
            panel.castShadow = true; panel.receiveShadow = true;
            group.add(panel);

            const beamCount = Math.floor(w / 4);
            const beamGeo = new THREE.BoxGeometry(0.2, panelH, t * 1.2);
            for(let i=0; i<=beamCount; i++) {
                const beamX = -w/2 + (i * w/beamCount) || 0; 
                const beam = new THREE.Mesh(beamGeo, mats.whiteMetal);
                beam.position.set(beamX, baseH + panelH / 2, 0);
                group.add(beam);
            }
            scene.add(group);
            
            group.updateWorldMatrix(true, false);
            obstacles.push(new THREE.Box3().setFromObject(group));
        }

        function createHoarding(size) {
            const t = 0.5;
            buildWallSegment(size, t, 0, 0, -size/2, 0); 
            buildWallSegment(size, t, size/2, 0, 0, Math.PI/2);
            buildWallSegment(size, t, -size/2, 0, 0, Math.PI/2);
            
            buildWallSegment(32, t, -24, 0, size/2, 0);
            buildWallSegment(32, t, 24, 0, size/2, 0);

            const gateGroup = new THREE.Group();
            gateGroup.position.set(0, 0, size/2);
            
            const pillarGeo = new THREE.BoxGeometry(1.2, 7, 1.2);
            const leftPillar = new THREE.Mesh(pillarGeo, mats.whiteMetal);
            leftPillar.position.set(-8.5, 3.5, 0); leftPillar.castShadow = true; gateGroup.add(leftPillar);
            const rightPillar = new THREE.Mesh(pillarGeo, mats.whiteMetal);
            rightPillar.position.set(8.5, 3.5, 0); rightPillar.castShadow = true; gateGroup.add(rightPillar);

            const boardGeo = new THREE.BoxGeometry(20, 2.5, 1.5);
            const board = new THREE.Mesh(boardGeo, mats.whiteMetal);
            board.position.set(0, 7, 0); board.castShadow = true; gateGroup.add(board);

            for(let i=0; i<3; i++) {
                const barrier = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1, 0.8), i%2==0 ? mats.redBarrier : mats.whiteMetal);
                barrier.position.set(-6 + i*2, 0.5, 2); barrier.castShadow = true; gateGroup.add(barrier);
                
                const barrier2 = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1, 0.8), i%2==0 ? mats.redBarrier : mats.whiteMetal);
                barrier2.position.set(6 - i*2, 0.5, 2); barrier2.castShadow = true; gateGroup.add(barrier2);
            }

            const guardBox = new THREE.Mesh(new THREE.BoxGeometry(2.5, 3, 2.5), mats.whiteMetal);
            guardBox.position.set(-6.5, 1.5, -2); guardBox.castShadow = true; gateGroup.add(guardBox);

            scene.add(gateGroup);
            gateGroup.updateWorldMatrix(true, false);
            obstacles.push(new THREE.Box3().setFromObject(gateGroup));
        }

        // --- 住民 (elderly) 生成與防撞尋路 ---
        const workers = [];
        let workerIdCounter = 1;

        function createElder(x, z) {
            const group = new THREE.Group();
            group.position.set(x, 0, z);

            const cloth = new THREE.MeshStandardMaterial({ color: 0xcfae9b });
            const skinMat = new THREE.MeshStandardMaterial({ color: 0x7a5f4a });

            const legGeo = new THREE.CylinderGeometry(0.12, 0.12, 1.2);
            const leftLeg = new THREE.Mesh(legGeo, skinMat); leftLeg.position.set(-0.18, 0.6, 0); group.add(leftLeg);
            const rightLeg = new THREE.Mesh(legGeo, skinMat); rightLeg.position.set(0.18, 0.6, 0); group.add(rightLeg);
            const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 1.0), cloth); torso.position.set(0, 1.6, 0); group.add(torso);
            const armGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.9);
            const leftArm = new THREE.Mesh(armGeo, skinMat); leftArm.position.set(-0.4, 1.6, 0); leftArm.rotation.z = 0.2; group.add(leftArm);
            const rightArm = new THREE.Mesh(armGeo, skinMat); rightArm.position.set(0.4, 1.6, 0); rightArm.rotation.z = -0.2; group.add(rightArm);
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.28), skinMat); head.position.set(0, 2.2, 0); group.add(head);

            const trackerBox = new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.BoxGeometry(1.0, 2.4, 1.0)), new THREE.LineBasicMaterial({ color: 0xff0000, linewidth: 2 }));
            trackerBox.position.y = 1.2; trackerBox.visible = false; group.add(trackerBox);

            group.castShadow = true;
            group.traverse(child => { if(child.isMesh) child.castShadow = true; });
            scene.add(group);

            workers.push({
                id: (workerIdCounter++).toString().padStart(3, '0'),
                mesh: group,
                trackerBox: trackerBox,
                velocity: new THREE.Vector3((Math.random()-0.5)*0.02, 0, (Math.random()-0.5)*0.02),
                changeDirTimer: 0,
                state: { fallen: false, rescued: false },
                timers: { fall: 0 }
            });
        }

        function isPositionColliding(pos) {
            const checkVec = new THREE.Vector3(pos.x, 1.0, pos.z);
            for(let obs of obstacles) {
                if (obs.containsPoint(checkVec)) return true;
            }
            if(pos.x < -38 || pos.x > 38 || pos.z < -38 || pos.z > 38) return true;
            return false;
        }
        function updateWorkers() {
            workers.forEach(w => {
                if (!w.state.fallen) {
                    const nextPos = w.mesh.position.clone().add(w.velocity);
                    let collision = isPositionColliding(nextPos);
                    if (collision) {
                        w.velocity.x *= -1; w.velocity.z *= -1; w.changeDirTimer = 999;
                    } else {
                        w.mesh.position.copy(nextPos);
                    }

                    if (w.velocity.lengthSq() > 0) {
                        const targetPos = w.mesh.position.clone().add(w.velocity);
                        targetPos.y = w.mesh.position.y; w.mesh.lookAt(targetPos); w.mesh.rotateY(Math.PI);
                    }

                    w.changeDirTimer++;
                    if (w.changeDirTimer > 200 + Math.random() * 400) {
                        // elderlies move slowly and change direction less often
                        w.velocity.set((Math.random()-0.5)*0.02, 0, (Math.random()-0.5)*0.02);
                        w.changeDirTimer = 0;
                    }

                    // Fall detection
                    if (!w.state.fallen && Math.random() < aiParams.fallFreq) {
                        w.state.fallen = true;
                        w.timers.fall = (aiParams.responseDelay || 30) + Math.floor(Math.random() * 20);
                        // simulate lying down by rotating and lowering slightly
                        w.mesh.rotation.x = Math.PI/2 * 0.9;
                        w.mesh.position.y = 0.2;
                        w.trackerBox.visible = true;
                        addAILog(`⚠️ 偵測跌倒：住民 ID-${w.id} 發生跌倒！`);
                        // if auto-dispatch enabled, shorten response
                        const auto = document.getElementById('auto-dispatch');
                        if (auto && auto.checked) {
                            w.timers.fall = Math.min(w.timers.fall, 6);
                            addAILog(`📤 自動派遣：系統已通知護理人員，請求快速回應。`);
                        }
                    }
                } else {
                    // fallen state: countdown to automatic rescue if enabled
                    if (w.timers.fall > 0) {
                        w.timers.fall--;
                    } else {
                        // auto-rescue arrival
                        w.state.fallen = false; w.trackerBox.visible = false; w.mesh.rotation.x = 0; w.mesh.position.y = 0;
                        addAILog(`✅ 系統：住民 ID-${w.id} 已由系統或護理人員協助回復。`);
                    }
                }
            });
        }

        createRoomBackdrop();

        function spawnWorkers() {
            const count = popConfig[currentPopLevel][currentScenario];

            // Remove existing workers
            workers.forEach(w => scene.remove(w.mesh));
            workers.length = 0; // Clear array

            for(let i=0; i<count; i++) {
                let cx, cz;
                let attempts = 0;
                do {
                    cx = -20 + Math.random() * 40;
                    cz = -18 + Math.random() * 36;
                    attempts++;
                } while(isPositionColliding({x: cx, z: cz}) && attempts < 50);

                createElder(cx, cz);
            }
        }

        // Initialize state
        spawnWorkers();

        // DOM Elements
        const btnBefore = document.getElementById('btn-before');
        const btnDuring = document.getElementById('btn-during');
        const btnAfter = document.getElementById('btn-after');
        const btnPopLow = document.getElementById('btn-pop-low');
        const btnPopMed = document.getElementById('btn-pop-med');
        const btnPopHigh = document.getElementById('btn-pop-high');

        // Parameter Sliders
        document.getElementById('freq-fall').addEventListener('input', (e) => {
            aiParams.fallFreq = e.target.value / 10000;
            document.getElementById('val-freq-fall').innerText = (e.target.value / 100).toFixed(2) + '%';
        });
        document.getElementById('resp-delay').addEventListener('input', (e) => {
            aiParams.responseDelay = parseInt(e.target.value);
            document.getElementById('val-resp-delay').innerText = e.target.value;
        });
        document.getElementById('auto-dispatch').addEventListener('change', (e) => {
            document.getElementById('val-auto-dispatch').innerText = e.target.checked ? 'ON' : 'OFF';
        });

        // Scenario & Population Logic
        function setPopLevel(level) {
            btnPopLow.classList.remove('active');
            btnPopMed.classList.remove('active');
            btnPopHigh.classList.remove('active');
            
            if(level === 'low') btnPopLow.classList.add('active');
            if(level === 'med') btnPopMed.classList.add('active');
            if(level === 'high') btnPopHigh.classList.add('active');
            
            currentPopLevel = level;
            spawnWorkers();
            const levelMap = { low: '低', med: '中', high: '高' };
            addAILog(`👥 系統：人數配置已切換為「${levelMap[level]}」檔`);
        }

        btnPopLow.addEventListener('click', () => setPopLevel('low'));
        btnPopMed.addEventListener('click', () => setPopLevel('med'));
        btnPopHigh.addEventListener('click', () => setPopLevel('high'));

        // Emergency call button
        const btnCallNurse = document.getElementById('btn-call-nurse');
        btnCallNurse.addEventListener('click', () => callNurse());

        function callNurse() {
            const fallen = workers.filter(w => w.state.fallen);
            if (fallen.length === 0) { addAILog('🟢 系統：當前無跌倒事件需要救援。'); return; }
            // pick the oldest fallen (or first)
            const target = fallen[0];
            target.state.fallen = false;
            target.trackerBox.visible = false;
            target.mesh.rotation.x = 0; target.mesh.position.y = 0;
            addAILog(`🚑 呼叫護理：護理人員已前往並協助住民 ID-${target.id}。`);
        }

        function setScenario(stage) {
            currentScenario = stage;
            btnBefore.classList.remove('active');
            btnDuring.classList.remove('active');
            btnAfter.classList.remove('active');
            
            if (stage === 'before') {
                btnBefore.classList.add('active');
                ambientLight.color.setHex(0x556677); // 較冷的清晨環境光
                dirLight.color.setHex(0x88aacc); // 偏藍紫的初明光線
                dirLight.intensity = 1.0;
                addAILog("🌅 系統：已切換至「清晨」時段。");
            } else if (stage === 'during') {
                btnDuring.classList.add('active');
                ambientLight.color.setHex(0x666666);
                dirLight.color.setHex(0xffffee);
                dirLight.intensity = 3.0;
                addAILog("☀️ 系統：已切換至「中午」時段。");
            } else if (stage === 'after') {
                btnAfter.classList.add('active');
                ambientLight.color.setHex(0x333344); 
                dirLight.color.setHex(0xffcc88); // 些微路燈或工地的暖色照明
                dirLight.intensity = 0.8;
                addAILog("🌃 系統：已切換至「夜間」時段。");
            }
            
            spawnWorkers();
        }

        btnBefore.addEventListener('click', () => setScenario('before'));
        btnDuring.addEventListener('click', () => setScenario('during'));
        btnAfter.addEventListener('click', () => setScenario('after'));

        // --- 動畫迴圈 ---
        function animate() {
            requestAnimationFrame(animate);

            controls.target.clamp(minTarget, maxTarget);
            controls.update();

            updateWorkers(); 
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
